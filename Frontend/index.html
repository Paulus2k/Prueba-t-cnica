<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestor de Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">
  <header>
    <h1 id="title">Gestor de <span>Productos</span></h1>
    <div class="header-controls">
      <span id="rate-display" class="rate-badge" style="display:none;"></span>
      <select id="currency-select" class="currency-select"></select>
      <button class="pill-btn" id="lang-btn">EN</button>
    </div>
  </header>

  <!-- Filters -->
  <div class="filters">
    <input type="text"   id="filter-name"      placeholder="Buscar por nombre…"/>
    <input type="number" id="filter-min-price" placeholder="Precio mín." min="0" step="0.01"/>
    <input type="number" id="filter-max-price" placeholder="Precio máx." min="0" step="0.01"/>
    <select id="filter-cat"></select>
  </div>

  <div class="grid">

    <!-- FORM -->
    <div class="panel">
      <h2 id="form-title">Agregar Producto</h2>
      <form id="product-form" novalidate>
        <input type="hidden" id="edit-id"/>

        <div class="form-group">
          <label for="name" id="label-name">Nombre</label>
          <input type="text" id="name" required/>
        </div>

        <div class="form-group">
          <label for="description" id="label-desc">Descripción</label>
          <textarea id="description" required></textarea>
        </div>

        <div class="form-group">
          <label for="price" id="label-price">Precio (USD)</label>
          <input type="number" id="price" placeholder="0.00" min="0" step="0.01" required/>
        </div>

        <div class="form-group">
          <label for="stock" id="label-stock">Stock</label>
          <input type="number" id="stock" placeholder="0" min="0" step="1"/>
        </div>

        <div class="form-group">
          <label for="category" id="label-cat">Categoría</label>
          <select id="category" required></select>
        </div>

        <div class="form-group" id="custom-cat-group" style="display:none;">
          <label for="custom-category" id="label-custom-cat">Nombre de categoría</label>
          <input type="text" id="custom-category" placeholder="Ej: Mascotas"/>
        </div>

        <div class="form-btn-group">
          <button class="btn-primary" type="submit" id="submit-btn">Agregar Producto</button>
          <button class="btn-cancel"  type="button" id="cancel-btn" style="display:none;">Cancelar</button>
        </div>
      </form>
    </div>

    <!-- PRODUCTS LIST -->
    <div>
      <div class="products-header">
        <h2 id="list-title">Productos</h2>
        <span id="product-count">0 elementos</span>
      </div>
      <div id="product-list"></div>
      <div id="empty-state">Aún no hay productos. Agrega uno con el formulario.</div>
    </div>

  </div>

  <!-- CATEGORY MANAGER -->
  <div class="history-section" style="margin-top:1rem;">
    <button class="history-toggle" id="catmgr-toggle">
      <span id="catmgr-btn-label">Gestionar Categorías</span>
      <span class="history-arrow" id="catmgr-arrow">▼</span>
    </button>
    <div id="catmgr-panel" style="display:none;">
      <div id="catmgr-list"></div>
      <div id="catmgr-empty">No hay categorías registradas.</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section">
    <button class="history-toggle" id="history-toggle">
      <span id="history-btn-label">Historial de Cambios</span>
      <span class="history-arrow" id="history-arrow">▼</span>
    </button>
    <div id="history-panel" style="display:none;">
      <div id="history-list"></div>
      <div id="history-empty">No hay cambios registrados aún.</div>
    </div>
  </div>

</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
